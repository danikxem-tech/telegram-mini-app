<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Информационное приложение</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#2AABEE;
color:white;
font-size:16px;
}
</style>

</head>

<body>

<h2>📱 Информационное мини-приложение</h2>

<div class="card">
<h3>О проекте</h3>
<p>Это пример мини-приложения Telegram.</p>
</div>

<div class="card">
<h3>Контакты</h3>
<p>email@example.com</p>
</div>

<div class="card">
<button onclick="openSite()">🌐 Перейти на сайт</button>
</div>

<script>

function openSite(){
window.open("https://google.com")
}

</script>

</body>
</html>
